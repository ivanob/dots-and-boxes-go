<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dots and Boxes - Multiplayer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell,
        sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 900px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    /* Lobby Screen */
    .lobby-actions {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    input,
    button {
      padding: 12px 16px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    input {
      flex: 1;
      min-width: 200px;
      color: #333;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      background: #667eea;
      color: white;
      border: none;
      font-weight: 600;
      padding: 12px 24px;
    }

    button:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .game-info {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .game-info h2 {
      font-size: 18px;
      color: #333;
      margin-bottom: 10px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #666;
    }

    .players-list {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .players-list h3 {
      color: #333;
      margin-bottom: 10px;
    }

    .player-item {
      padding: 8px;
      background: white;
      border-radius: 4px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .player-item.active {
      background: #e3f2fd;
      border-left: 4px solid #667eea;
    }

    .player-badge {
      display: inline-block;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
    }

    .player-badge.p1 {
      background: #ff6b6b;
    }
    .player-badge.p2 {
      background: #4ecdc4;
    }
    .player-badge.p3 {
      background: #ffd93d;
    }
    .player-badge.p4 {
      background: #a78bfa;
    }

    /* Game Board */
    .game-board-container {
      display: flex;
      gap: 30px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .board-section {
      flex: 1;
      min-width: 300px;
    }

    .board-canvas {
      background: white;
      border: 2px solid #ddd;
      border-radius: 8px;
      display: block;
      margin: 0 auto;
      cursor: crosshair;
      max-width: 100%;
    }

    .scores {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
    }

    .scores h3 {
      color: #333;
      margin-bottom: 15px;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: white;
      border-radius: 4px;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .score-row.active {
      background: #e3f2fd;
      border-left: 4px solid #667eea;
      padding-left: 8px;
    }

    /* Game Over Screen */
    .game-over-content {
      text-align: center;
    }

    .game-result {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .game-result h2 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
    }

    .winner-badge {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .game-result p {
      color: #666;
      font-size: 16px;
      margin-bottom: 5px;
    }

    .stats {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e0e0e0;
      color: #666;
    }

    .stat-row:last-child {
      border-bottom: none;
    }

    .status-message {
      padding: 15px;
      background: #e3f2fd;
      border-left: 4px solid #667eea;
      border-radius: 4px;
      color: #333;
      margin-bottom: 15px;
    }

    .status-message.error {
      background: #ffebee;
      border-left-color: #ff6b6b;
      color: #c62828;
    }

    .status-message.success {
      background: #e8f5e9;
      border-left-color: #4caf50;
      color: #1b5e20;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .flex-center {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 20px;
      }

      .game-board-container {
        flex-direction: column;
        gap: 20px;
      }

      input,
      button {
        width: 100%;
      }

      .lobby-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Lobby Screen -->
    <div id="lobbyScreen" class="screen active">
      <h1>🎮 Dots and Boxes</h1>

      <div id="statusMessage"></div>

      <div class="lobby-actions">
        <input id="gameIdInput" type="text" placeholder="Enter Game ID to join..." />
        <button onclick="joinGame()">Join Game</button>
        <button onclick="createGame()">Create Game</button>
      </div>

      <div id="gameIdDisplay" class="game-info" style="display: none">
        <h2>Your Game ID</h2>
        <p id="gameId" style="font-family: monospace; font-size: 18px; color: #667eea; word-break: break-all"></p>
        <button onclick="copyGameId()" style="margin-top: 10px; width: 100%">Copy to Clipboard</button>
      </div>

      <div class="game-info">
        <h2>Game Settings</h2>
        <div class="info-row">
          <span>Grid Size:</span>
          <select id="gridSize" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px">
            <option value="2">2x2 dots (1 box) - testing</option>
            <option value="3">3x3 dots (4 boxes) - testing</option>
            <option value="5" selected>5x5 dots (16 boxes)</option>
            <option value="6">6x6 dots (25 boxes)</option>
            <option value="7">7x7 dots (36 boxes)</option>
          </select>
        </div>
      </div>

      <div id="playersContainer" class="players-list" style="display: none">
        <h3>Players</h3>
        <div id="playersList"></div>
        <button id="startButton" onclick="startGame()" style="margin-top: 10px; width: 100%; display: none">
          Start Game
        </button>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="gameScreen" class="screen">
      <h1>🎮 Dots and Boxes</h1>

      <div id="gameStatus" class="status-message" style="display: none"></div>

      <div class="game-board-container">
        <div class="board-section">
          <canvas id="gameBoard" class="board-canvas"></canvas>
        </div>

        <div class="board-section">
          <div class="scores">
            <h3>Scores</h3>
            <div id="scoreBoard"></div>
          </div>
        </div>
      </div>

      <div class="game-info">
        <div class="info-row">
          <span>Current Player:</span>
          <span id="currentPlayer">-</span>
        </div>
        <div class="info-row">
          <span>Game ID:</span>
          <span id="gameIdSmall" style="font-family: monospace"></span>
        </div>
      </div>

      <button onclick="leaveGame()" style="width: 100%">Leave Game</button>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="screen">
      <h1>🎮 Dots and Boxes</h1>

      <div class="game-over-content">
        <div class="game-result">
          <div class="winner-badge" id="resultEmoji">🏆</div>
          <h2 id="resultTitle">Game Over</h2>
          <p id="resultMessage"></p>
        </div>

        <div class="stats">
          <h3>Final Scores</h3>
          <div id="finalScores"></div>
        </div>

        <div class="stats">
          <div class="stat-row">
            <span>Total Moves:</span>
            <span id="statMoves">0</span>
          </div>
          <div class="stat-row">
            <span>Duration:</span>
            <span id="statDuration">0m</span>
          </div>
          <div class="stat-row">
            <span>Grid Size:</span>
            <span id="statGrid">5x5</span>
          </div>
        </div>

        <button onclick="returnToLobby()" style="width: 100%">Return to Lobby</button>
      </div>
    </div>
  </div>
